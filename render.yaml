# Render Blueprint: deploy the FastAPI backend (Phase 4) as a Web Service.
# Set GROQ_API_KEY in Render Dashboard (Environment) for the service.
# ChromaDB and embedding model must exist in the repo (run pipeline locally and commit
# phase3_embeddings/chroma_db and optionally .cache for embeddings) or add a build step.

services:
  - type: web
    name: mutualfundrag-backend
    runtime: python
    region: oregon

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn phase4_backend.app:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
        generateValue: false
