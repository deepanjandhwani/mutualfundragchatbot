# Build backend Docker image, push to GHCR, then trigger Railway redeploy (optional secrets).
# Required for Railway auto-redeploy after GHCR push:
#   RAILWAY_API_TOKEN      — Railway account token (Settings → Tokens → Create Token)
#   RAILWAY_SERVICE_ID     — Service ID (service Settings → URL or General tab)
#   RAILWAY_ENVIRONMENT_ID — Environment ID (often "production"; Railway CLI or API)
name: Build backend image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'requirements-railway.txt'
      - 'shared/**'
      - 'phase3_embeddings/**'
      - 'phase4_backend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mutualfundrag-backend:latest
            ghcr.io/${{ github.repository_owner }}/mutualfundrag-backend:${{ github.sha }}

      - name: Trigger Railway redeploy
        if: success() && secrets.RAILWAY_API_TOKEN != '' && secrets.RAILWAY_SERVICE_ID != '' && secrets.RAILWAY_ENVIRONMENT_ID != ''
        run: |
          curl -sS -X POST "https://backboard.railway.app/graphql/v2" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\", serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\") }"
            }'
          echo "Railway redeploy triggered"
