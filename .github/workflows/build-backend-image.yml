# Build backend Docker image, push to GHCR, then optionally trigger a Render deploy.
# Optional GitHub repo secret (Render dashboard → your service → Settings → Deploy Hook):
#   RENDER_DEPLOY_HOOK_URL — POST triggers a fresh deploy (if you use a deploy hook instead of Git auto-deploy)
name: Build backend image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'requirements-railway.txt'
      - 'shared/**'
      - 'phase3_embeddings/**'
      - 'phase4_backend/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mutualfundrag-backend:latest
            ghcr.io/${{ github.repository_owner }}/mutualfundrag-backend:${{ github.sha }}

      - name: Trigger Render deploy hook
        if: success()
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set; skipping (Render can auto-deploy from Git on push)."
            exit 0
          fi
          curl -sS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered"
